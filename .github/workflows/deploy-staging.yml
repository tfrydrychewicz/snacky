name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy-migrations:
    name: Apply Migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Push database migrations
        run: supabase db push

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: deploy-migrations
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy all Edge Functions
        run: supabase functions deploy

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-migrations, deploy-functions]
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.deploy-migrations.result }}" = "success" ] && [ "${{ needs.deploy-functions.result }}" = "success" ]; then
            echo "✅ Staging deployment succeeded"
          else
            echo "❌ Staging deployment failed"
            echo "  Migrations: ${{ needs.deploy-migrations.result }}"
            echo "  Functions:  ${{ needs.deploy-functions.result }}"
            exit 1
          fi
