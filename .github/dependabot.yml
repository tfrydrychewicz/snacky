version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      react-native:
        patterns:
          - 'react-native*'
          - '@react-native*'
          - '@react-navigation/*'
        update-types:
          - 'minor'
          - 'patch'
      supabase:
        patterns:
          - '@supabase/*'
          - 'supabase'
      linting:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'prettier*'
      testing:
        patterns:
          - 'jest*'
          - '@types/jest'
          - 'react-test-renderer'
    ignore:
      # react and react-test-renderer are pinned to 19.2.3 to match
      # react-native-renderer bundled with react-native 0.84.1.
      # Unpin when react-native upgrades its renderer version.
      - dependency-name: 'react'
      - dependency-name: 'react-test-renderer'
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'dependencies'
